<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/log/style.css" />
</head>
<body>

  <header class="auth-header">
    <a href="/index.html" class="logo">
      <div class="logo-icon"></div>
      <span>Brand</span>
    </a>
    <nav class="auth-nav">
      <span>Нет аккаунта?</span>
      <a href="/log/registration/index.html" class="btn-secondary">Создать аккаунт</a>
    </nav>
  </header>

  <main class="auth-container">
    <section class="auth-card">
      <h1>С возвращением</h1>
      <p class="subtitle">Введите свои данные для входа</p>

      <form id="authForm">
        <input type="email" placeholder="Email" id="email" required />
        <input type="password" placeholder="Пароль" id="password" required />
        <p class="error-msg" id="errorMsg"></p>
        <button type="submit">Войти</button>
        <label>
          Еще нет аккаунта?
          <a href="/log/registration/index.html">Зарегистрироваться</a>
        </label>
      </form>
    </section>
  </main>

  <script src="/js/class.js"></script>
  <script src="/js/log/log.js"></script>
  <script>
    const form = document.getElementById('authForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !email.includes('@') || email.length < 5) {
        errorMsg.textContent = 'Введите корректный email (минимум 5 символов)';
        return;
      }
      if (email.length > 25) {
        errorMsg.textContent = 'Email не более 25 символов';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Пароль должен быть минимум 6 символов';
        return;
      }

      try {
        const um = await getUserManager();
        const user = await um.login(email, password);

        errorMsg.style.color = '#27ae60';
        errorMsg.textContent = 'Успешный вход!';

        setTimeout(() => {
          if (user.role === 'admin') window.location.href = '/admin/admin.html';
          else if (user.role === 'seller') window.location.href = '/seller/seller.html';
          else window.location.href = '/profile/';
        }, 800);
      } catch (err) {
        errorMsg.style.color = '#c0392b';
        errorMsg.textContent = err.message || 'Неверный email или пароль';
      }
    });
  </script>
</body>
</html>
