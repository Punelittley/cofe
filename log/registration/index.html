<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/log/style.css" />
</head>
<body>

  <header class="auth-header">
    <a href="/index.html" class="logo">
      <div class="logo-icon"></div>
      <span>Brand</span>
    </a>
    <nav class="auth-nav">
      <span>Уже есть аккаунт?</span>
      <a href="/log/authorization/index.html" class="btn-secondary">Войти</a>
    </nav>
  </header>

  <main class="auth-container">
    <section class="auth-card">
      <h1>Создать аккаунт</h1>
      <p class="subtitle">Начните работу с платформой сегодня</p>

      <form id="registForm">
        <input type="text" placeholder="Фамилия" id="surname" required />
        <input type="text" placeholder="Имя" id="name" required />
        <input type="email" placeholder="Email" id="email" required />
        <input type="password" placeholder="Пароль" id="password" required />
        <input type="password" placeholder="Подтверждение пароля" id="password_confirm" required />

        <div class="checkbox-row">
          <input type="checkbox" id="checkbox" />
          <p>Я согласен с Политикой конфиденциальности и принимаю Пользовательское соглашение</p>
        </div>

        <p class="error-msg" id="errorMsg"></p>
        <button type="submit">Зарегистрироваться</button>
        <label>
          Уже есть аккаунт?
          <a href="/log/authorization/index.html">Войти</a>
        </label>
      </form>
    </section>
  </main>

  <script src="/js/class.js"></script>
  <script src="/js/log/log.js"></script>
  <script>
    const form = document.getElementById('registForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      errorMsg.style.color = '#c0392b';

      const surname = document.getElementById('surname').value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('password_confirm').value;
      const checkbox = document.getElementById('checkbox');

      if (surname.length < 2 || surname.length > 13) {
        errorMsg.textContent = 'Фамилия: от 2 до 13 символов';
        return;
      }
      if (name.length < 2 || name.length > 13) {
        errorMsg.textContent = 'Имя: от 2 до 13 символов';
        return;
      }
      if (!email || !email.includes('@') || email.length < 5) {
        errorMsg.textContent = 'Введите корректный email';
        return;
      }
      if (email.length > 25) {
        errorMsg.textContent = 'Email не более 25 символов';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Пароль должен быть минимум 6 символов';
        return;
      }
      if (password.length > 50) {
        errorMsg.textContent = 'Пароль слишком длинный (макс. 50 символов)';
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Пароли не совпадают!';
        return;
      }
      if (!checkbox.checked) {
        errorMsg.textContent = 'Необходимо принять соглашение';
        return;
      }

      try {
        const um = await getUserManager();
        await um.register(surname, name, email, password);
        errorMsg.style.color = '#27ae60';
        errorMsg.textContent = 'Регистрация успешна!';
        setTimeout(() => { window.location.href = '/profile/'; }, 1000);
      } catch (err) {
        errorMsg.textContent = err.message || 'Ошибка регистрации';
      }
    });
  </script>
</body>
</html>
